<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Scroll Controller</title>

<style>
body{
margin:0;
background:#111;
display:flex;
flex-direction:column;
height:100vh;
font-family:Arial;
}

button{
flex:1;
font-size:60px;
font-weight:bold;
border:none;
color:white;
}

#up{
background:#00b894;
}

#down{
background:#d63031;
}
</style>

</head>

<body>

<button id="up" onclick="scrollUp()">⬆ SCROLL UP</button>

<button id="down" onclick="scrollDown()">⬇ SCROLL DOWN</button>

<script src="/socket.io/socket.io.js"></script>
<script src="controller.js"></script>

</body>
</html>
